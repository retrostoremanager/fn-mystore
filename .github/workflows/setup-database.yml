name: Setup Database (temp)

on:
  workflow_dispatch:

# Shares the function deploy's lock so a manual DB setup can't race the deploy
# workflow while both write mystore-func-dev app settings.
concurrency:
  group: deploy-function-app-dev
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Create database if missing
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          psql "host=mystore-postgres-dev.postgres.database.azure.com port=5432 dbname=postgres user=sqladmin sslmode=require" \
            -c "SELECT 1 FROM pg_database WHERE datname='mystore-db-dev'" | grep -q 1 \
          && echo "Database mystore-db-dev already exists" \
          || (psql "host=mystore-postgres-dev.postgres.database.azure.com port=5432 dbname=postgres user=sqladmin sslmode=require" \
                -c "CREATE DATABASE \"mystore-db-dev\";" \
              && echo "Created database mystore-db-dev")

      - name: Update function app connection string
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          az functionapp config appsettings set \
            --resource-group mystore-rg-dev \
            --name mystore-func-dev \
            --settings \
            "ConnectionStrings__DefaultConnection=Host=mystore-postgres-dev.postgres.database.azure.com;Port=5432;Database=mystore-db-dev;Username=sqladmin;Password=${POSTGRES_ADMIN_PASSWORD};SSL Mode=Require"
          echo "Connection string updated to mystore-db-dev."
