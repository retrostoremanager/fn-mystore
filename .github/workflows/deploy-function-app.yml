name: Deploy Function App

on:
  push:
    branches:
      - development
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore MyStore.sln
    
    - name: Build
      run: dotnet build MyStore.sln --configuration Release --no-restore
    
    - name: Publish
      run: dotnet publish MyStore.Functions/MyStore.Functions.csproj --configuration Release --output ./publish --no-build
    
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Deploy to Azure Function App
      uses: Azure/functions-action@v1
      with:
        app-name: mystore-func-dev
        package: ./publish
    
    - name: Deployment Complete
      run: |
        echo "Function App deployed successfully!"
        echo "URL: https://mystore-func-dev.azurewebsites.net"
