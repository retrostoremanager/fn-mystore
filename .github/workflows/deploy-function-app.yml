name: Deploy Function App

on:
  pull_request:
    types: [closed]
    branches:
      - development
  workflow_dispatch:

jobs:
  build-and-deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: development

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore MyStore.sln

    - name: Build
      run: dotnet build MyStore.sln --configuration Release --no-restore

    - name: Publish
      run: dotnet publish MyStore.Functions/MyStore.Functions.csproj --configuration Release --output ./publish --no-build

    - name: Verify publish output
      run: |
        echo "Publish output contents:"
        ls -la ./publish
        echo "Checking for host.json:"
        test -f ./publish/host.json && echo "host.json found" || echo "WARNING: host.json missing"
        echo "Checking for worker:"
        ls ./publish/*.dll 2>/dev/null | head -5 || echo "No DLLs found"

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Apply DB migrations
      env:
        POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        PGSSLMODE: require
      run: |
        sudo apt-get install -y postgresql-client --quiet
        PGPASSWORD="$POSTGRES_ADMIN_PASSWORD" psql \
          "postgresql://sqladmin@mystore-postgres-b1.postgres.database.azure.com/mystore-db-dev" \
          -v ON_ERROR_STOP=0 \
          -c "ALTER TABLE trade_in ALTER COLUMN payment_type DROP NOT NULL;" \
          -c "ALTER TABLE trade_in DROP CONSTRAINT IF EXISTS chk_trade_in_payment_type;" \
          -c "ALTER TABLE trade_in ADD CONSTRAINT chk_trade_in_payment_type CHECK (payment_type IS NULL OR payment_type IN ('cash', 'store_credit'));" \
          -c "ALTER TABLE trade_in ALTER COLUMN created_by DROP NOT NULL;" \
          && echo "Migrations applied." || echo "Migration step had errors (constraint may already be in the desired state)."

    - name: Deploy to Azure Function App
      run: |
        cd publish
        zip -r ../deploy.zip . -x "*.git*"
        cd ..
        az functionapp deployment source config-zip \
          --resource-group mystore-rg-dev \
          --name mystore-func-dev \
          --src deploy.zip

    - name: Configure app settings
      env:
        JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        STRIPE_PRICE_ID_MONTHLY: ${{ secrets.STRIPE_PRICE_ID_MONTHLY }}
        STRIPE_PRICE_ID_YEARLY: ${{ secrets.STRIPE_PRICE_ID_YEARLY }}
        CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
      run: |
        az functionapp config appsettings set \
          --resource-group mystore-rg-dev \
          --name mystore-func-dev \
          --settings \
          "ConnectionStrings__DefaultConnection=Host=mystore-postgres-b1.postgres.database.azure.com;Port=5432;Database=mystore-db-dev;Username=sqladmin;Password=${POSTGRES_ADMIN_PASSWORD};SSL Mode=Require" \
          "JwtAuthentication__SecretKey=${JWT_SECRET_KEY}" \
          "Stripe__SecretKey=${STRIPE_SECRET_KEY}" \
          "Stripe__PublishableKey=${STRIPE_PUBLISHABLE_KEY}" \
          "Stripe__WebhookSecret=${STRIPE_WEBHOOK_SECRET}" \
          "Stripe__PriceIdMonthly=${STRIPE_PRICE_ID_MONTHLY}" \
          "Stripe__PriceIdYearly=${STRIPE_PRICE_ID_YEARLY}" \
          "Cors__AllowedOrigins=${CORS_ALLOWED_ORIGINS}"

    - name: Deployment Complete
      run: |
        echo "Function App deployed successfully!"
        echo "URL: https://mystore-func-dev.azurewebsites.net"

    - name: Trigger test agent
      if: github.event_name == 'pull_request'
      env:
        GH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
        GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
      run: |
        PR_NUMBER="${{ github.event.pull_request.number }}"
        ORCHESTRATOR_ISSUE=$(gh pr view "$PR_NUMBER" --repo retrostoremanager/fn-mystore --json body \
          --jq '.body' | grep -oP 'orchestrator-mystore#\K[0-9]+' | head -1 || true)
        jq -n --arg pr "$PR_NUMBER" --arg issue "${ORCHESTRATOR_ISSUE:-}" \
          '{"ref":"main","inputs":{"pr_numbers":$pr,"target_repo":"fn-mystore","orchestrator_issues":$issue}}' | \
        gh api repos/retrostoremanager/fn-mystore/actions/workflows/test-agent.yml/dispatches \
          --method POST --input -
