name: Claude Code Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt for Claude'
        required: true
        type: string
      branch:
        description: 'Branch to check out (default: development)'
        required: false
        default: 'development'
        type: string
  repository_dispatch:
    types: [claude-agent]

jobs:
  # Triggered by @claude comments on issues and PRs
  claude-tag:
    if: >-
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore MyStore.sln

      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-sonnet-4-6
          timeout_minutes: 30

  # Triggered by workflow_dispatch (manual/CLI) or repository_dispatch (orchestrator)
  claude-agent:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Pre-flight spending cap check
        run: |
          LAST=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow=claude-code.yml \
            --limit=3 --json conclusion,createdAt,displayTitle \
            --jq '[.[] | select(.conclusion == "failure")] | .[0] // empty')
          if [ -n "$LAST" ]; then
            FAILED_AT=$(echo "$LAST" | jq -r '.createdAt')
            FAILED_AGE=$(( $(date +%s) - $(date -d "$FAILED_AT" +%s) ))
            if [ "$FAILED_AGE" -lt 3600 ]; then
              echo "::warning::Last workflow run failed within the past hour ($FAILED_AT)."
              echo "If this was due to a spending cap, visit https://claude.ai/settings to check your usage."
              echo "Proceeding anyway — if Claude errors immediately, the spending cap is likely still active."
            fi
          fi
          echo "Pre-flight check complete."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.event.client_payload.branch || 'development' }}
          fetch-depth: 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore MyStore.sln

      - id: claude
        uses: anthropics/claude-code-action@beta
        env:
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: ${{ github.event.inputs.prompt || github.event.client_payload.prompt }}
          mode: agent
          model: claude-sonnet-4-6
          allowed_tools: Bash,Edit,MultiEdit,Glob,Grep,LS,Read,Write,TodoWrite
          timeout_minutes: 30
          max_turns: 60

      - name: Build and test (post-agent validation)
        if: steps.claude.outcome == 'success'
        id: validate
        run: |
          dotnet restore MyStore.sln
          dotnet build MyStore.sln --configuration Release --no-restore
          dotnet test MyStore.Tests/MyStore.Tests.csproj --configuration Release --no-build \
            --logger "console;verbosity=normal"

      - name: Handle spending cap
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          BRANCH: ${{ github.event.inputs.branch || github.event.client_payload.branch || 'development' }}
          PROMPT: ${{ github.event.inputs.prompt || github.event.client_payload.prompt || '' }}
        run: |
          STEP_OUTPUT="${{ steps.claude.outputs.output }}"
          if ! echo "$STEP_OUTPUT" | grep -q "Spending cap reached"; then
            echo "Not a spending cap — stale recovery will handle it."
            exit 0
          fi
          RESET_STR=$(echo "$STEP_OUTPUT" | grep -oP 'Spending cap reached resets \K[^\n]+' | head -1)
          RESET_ISO=""
          if [ -n "$RESET_STR" ]; then
            if echo "$RESET_STR" | grep -qP '^\d+:\d+(am|pm)'; then
              RESET_EPOCH=$(TZ=America/New_York date -d "$RESET_STR" +%s 2>/dev/null || echo "")
              if [ -n "$RESET_EPOCH" ]; then
                CURRENT=$(date +%s)
                if [ "$RESET_EPOCH" -le "$CURRENT" ]; then
                  RESET_EPOCH=$(TZ=America/New_York date -d "tomorrow $RESET_STR" +%s 2>/dev/null || echo "")
                fi
                [ -n "$RESET_EPOCH" ] && RESET_ISO=$(date -u -d "@$RESET_EPOCH" +%Y-%m-%dT%H:%M:%SZ)
              fi
            else
              RESET_EPOCH=$(TZ=America/New_York date -d "$RESET_STR" +%s 2>/dev/null || echo "")
              [ -n "$RESET_EPOCH" ] && RESET_ISO=$(date -u -d "@$RESET_EPOCH" +%Y-%m-%dT%H:%M:%SZ)
            fi
          fi
          [ -z "$RESET_ISO" ] && RESET_ISO=$(date -u -d "+8 hours" +%Y-%m-%dT%H:%M:%SZ)
          ISSUE_N=$(echo "$BRANCH" | grep -oP 'feature/issue-\K[0-9]+' || true)
          if [ -z "$ISSUE_N" ]; then
            # Branch is 'development' (stale-recovery dispatch) — extract from prompt
            ISSUE_N=$(echo "$PROMPT" | grep -oP 'Issue #\K[0-9]+' | head -1 || true)
          fi
          if [ -z "$ISSUE_N" ]; then
            echo "Cannot determine issue from branch or prompt — no cap-wait label set"
            exit 0
          fi
          GH_TOKEN="$GH_DISPATCH_TOKEN" gh issue edit "$ISSUE_N" \
            --repo retrostoremanager/orchestrator-mystore \
            --add-label "cap-wait"
          GH_TOKEN="$GH_DISPATCH_TOKEN" gh issue comment "$ISSUE_N" \
            --repo retrostoremanager/orchestrator-mystore \
            --body "Spending cap reached. RESET_ISO: ${RESET_ISO}
          Raw message: $RESET_STR
          Will auto-resume after reset."
          echo "Marked issue #$ISSUE_N with cap-wait (resets $RESET_ISO)"

      - name: Trigger code review for any new PR
        if: steps.validate.outcome == 'success' || steps.validate.outcome == 'skipped'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          PROMPT: ${{ github.event.inputs.prompt || github.event.client_payload.prompt || '' }}
        run: |
          # First try: look for the PR belonging to THIS agent's specific issue (from prompt).
          # This prevents two concurrent agent runs both triggering a review for the same PR.
          ISSUE_N=$(echo "$PROMPT" | grep -oP 'Issue #\K[0-9]+' | head -1 || true)
          if [ -n "$ISSUE_N" ]; then
            PR_DATA=$(gh pr list \
              --base development \
              --state open \
              --json number,headRefName,labels \
              --jq "[.[] | select(
                .headRefName == \"feature/issue-${ISSUE_N}\" and
                (.labels | map(.name) | any(startswith(\"review-retry-\") or . == \"needs-human-review\") | not)
              )] | first // empty")
          fi

          # Fallback: scan for any open feature PR not yet in a review cycle.
          # (Covers @claude tag triggers and other non-orchestrator invocations.)
          if [ -z "$PR_DATA" ] || [ "$PR_DATA" = "null" ]; then
            PR_DATA=$(gh pr list \
              --base development \
              --state open \
              --json number,headRefName,labels \
              --jq '[.[] | select(
                (.headRefName | startswith("feature/issue-")) and
                (.labels | map(.name) | any(startswith("review-retry-") or . == "needs-human-review") | not)
              )] | first // empty')
          fi

          if [ -z "$PR_DATA" ] || [ "$PR_DATA" = "null" ]; then
            echo "No open feature PRs awaiting review — skipping"
            exit 0
          fi

          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.number')
          HEAD_BRANCH=$(echo "$PR_DATA" | jq -r '.headRefName')

          # Guard: skip if this PR's orchestrator issue is already in code-review state.
          PR_ISSUE_N=$(echo "$HEAD_BRANCH" | grep -oP 'feature/issue-\K[0-9]+' || true)
          if [ -n "$PR_ISSUE_N" ]; then
            ISSUE_LABELS=$(GH_TOKEN="$GH_DISPATCH_TOKEN" gh issue view "$PR_ISSUE_N" \
              --repo retrostoremanager/orchestrator-mystore \
              --json labels --jq '[.labels[].name]' 2>/dev/null || echo "[]")
            if echo "$ISSUE_LABELS" | grep -q '"code-review"'; then
              echo "Issue #$PR_ISSUE_N already in code-review — skipping duplicate dispatch"
              exit 0
            fi
          fi

          echo "Found PR #$PR_NUMBER on $HEAD_BRANCH — dispatching code review"
          export PR_NUMBER HEAD_BRANCH
          bash scripts/trigger-review.sh
