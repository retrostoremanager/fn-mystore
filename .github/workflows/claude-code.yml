name: Claude Code Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt for Claude'
        required: true
        type: string
      branch:
        description: 'Branch to check out (default: development)'
        required: false
        default: 'development'
        type: string
  repository_dispatch:
    types: [claude-agent]

jobs:
  # Triggered by @claude comments on issues and PRs
  claude-tag:
    if: >-
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore MyStore.sln

      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-sonnet-4-6
          timeout_minutes: 30

  # Triggered by workflow_dispatch (manual/CLI) or repository_dispatch (orchestrator)
  claude-agent:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Pre-flight spending cap check
        run: |
          LAST=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow=claude-code.yml \
            --limit=3 --json conclusion,createdAt,displayTitle \
            --jq '[.[] | select(.conclusion == "failure")] | .[0] // empty')
          if [ -n "$LAST" ]; then
            FAILED_AT=$(echo "$LAST" | jq -r '.createdAt')
            FAILED_AGE=$(( $(date +%s) - $(date -d "$FAILED_AT" +%s) ))
            if [ "$FAILED_AGE" -lt 3600 ]; then
              echo "::warning::Last workflow run failed within the past hour ($FAILED_AT)."
              echo "If this was due to a spending cap, visit https://claude.ai/settings to check your usage."
              echo "Proceeding anyway — if Claude errors immediately, the spending cap is likely still active."
            fi
          fi
          echo "Pre-flight check complete."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.event.client_payload.branch || 'development' }}
          fetch-depth: 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore MyStore.sln

      - uses: anthropics/claude-code-action@beta
        env:
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: ${{ github.event.inputs.prompt || github.event.client_payload.prompt }}
          mode: agent
          model: claude-sonnet-4-6
          allowed_tools: Bash,Edit,MultiEdit,Glob,Grep,LS,Read,Write,TodoWrite
          timeout_minutes: 30
          max_turns: 60

      - name: Trigger code review for any new PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
        run: |
          # The agent checks out 'development' then creates feature/issue-N itself,
          # so the input branch is always 'development' — we can't use it to find the PR.
          # Instead, find any open feature PR not yet in a review cycle.
          PR_DATA=$(gh pr list \
            --base development \
            --state open \
            --json number,headRefName,labels \
            --jq '[.[] | select(
              (.headRefName | startswith("feature/issue-")) and
              (.labels | map(.name) | any(startswith("review-retry-") or . == "needs-human-review") | not)
            )] | first // empty')

          if [ -z "$PR_DATA" ] || [ "$PR_DATA" = "null" ]; then
            echo "No open feature PRs awaiting review — skipping"
            exit 0
          fi

          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.number')
          HEAD_BRANCH=$(echo "$PR_DATA" | jq -r '.headRefName')
          echo "Found PR #$PR_NUMBER on $HEAD_BRANCH — dispatching code review"
          export PR_NUMBER HEAD_BRANCH
          bash scripts/trigger-review.sh
