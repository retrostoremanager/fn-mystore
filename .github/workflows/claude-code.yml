name: Claude Code Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt for Claude'
        required: true
        type: string
      branch:
        description: 'Branch to check out (default: development)'
        required: false
        default: 'development'
        type: string
  repository_dispatch:
    types: [claude-agent]

jobs:
  # Triggered by @claude comments on issues and PRs
  claude-tag:
    if: >-
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore MyStore.sln

      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-sonnet-4-6
          timeout_minutes: 30

  # Triggered by workflow_dispatch (manual/CLI) or repository_dispatch (orchestrator)
  claude-agent:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Pre-flight spending cap check
        run: |
          LAST=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow=claude-code.yml \
            --limit=3 --json conclusion,createdAt,displayTitle \
            --jq '[.[] | select(.conclusion == "failure")] | .[0] // empty')
          if [ -n "$LAST" ]; then
            FAILED_AT=$(echo "$LAST" | jq -r '.createdAt')
            FAILED_AGE=$(( $(date +%s) - $(date -d "$FAILED_AT" +%s) ))
            if [ "$FAILED_AGE" -lt 3600 ]; then
              echo "::warning::Last workflow run failed within the past hour ($FAILED_AT)."
              echo "If this was due to a spending cap, visit https://claude.ai/settings to check your usage."
              echo "Proceeding anyway — if Claude errors immediately, the spending cap is likely still active."
            fi
          fi
          echo "Pre-flight check complete."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.event.client_payload.branch || 'development' }}
          fetch-depth: 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore MyStore.sln

      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: ${{ github.event.inputs.prompt || github.event.client_payload.prompt }}
          mode: agent
          model: claude-sonnet-4-6
          allowed_tools: Bash,Edit,MultiEdit,Glob,Grep,LS,Read,Write,TodoWrite
          timeout_minutes: 30
          max_turns: 60

      - name: Trigger code review for any new PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
        run: |
          BRANCH="${{ github.event.inputs.branch || github.event.client_payload.branch || 'development' }}"
          # Only review feature/issue-* branches
          if [[ "$BRANCH" != feature/issue-* ]]; then
            echo "Branch $BRANCH is not a feature branch — skipping review trigger"
            exit 0
          fi
          PR_NUMBER=$(gh pr list --head "$BRANCH" --base development --state open \
            --json number --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for branch $BRANCH — agent may not have opened one"
            exit 0
          fi
          echo "Found PR #$PR_NUMBER on $BRANCH — dispatching code review"
          export PR_NUMBER HEAD_BRANCH="$BRANCH"
          bash scripts/trigger-review.sh
