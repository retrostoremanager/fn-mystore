name: Reset DB Password (temp)

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Reset PostgreSQL admin password
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          az postgres flexible-server update \
            --resource-group mystore-rg-dev \
            --name mystore-postgres-dev \
            --admin-password "$POSTGRES_ADMIN_PASSWORD" 2>&1 \
          && echo "flexible-server password reset OK" \
          || (echo "flexible-server not found, trying single-server..." && \
              az postgres server update \
                --resource-group mystore-rg-dev \
                --name mystore-postgres-dev \
                --admin-password "$POSTGRES_ADMIN_PASSWORD" 2>&1 \
              && echo "single-server password reset OK")

      - name: Update function app connection string
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          az functionapp config appsettings set \
            --resource-group mystore-rg-dev \
            --name mystore-func-dev \
            --settings \
            "ConnectionStrings__DefaultConnection=Host=mystore-postgres-dev.postgres.database.azure.com;Port=5432;Database=mystore-db;Username=sqladmin;Password=${POSTGRES_ADMIN_PASSWORD};SSL Mode=Require"
          echo "Connection string updated."

      - name: Verify DB connectivity
        run: |
          curl -s https://mystore-func-dev.azurewebsites.net/api/health
