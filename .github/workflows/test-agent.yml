name: Test Agent

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number that was just deployed'
        required: true
        type: string
      target_repo:
        description: 'Repo that was deployed (fn-mystore or web-mystore)'
        required: true
        type: string
        default: 'fn-mystore'
      orchestrator_issue:
        description: 'Orchestrator issue number (if any)'
        required: false
        type: string
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore MyStore.sln

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install -D @playwright/test
          npx playwright install chromium --with-deps

      - name: Build test prompt
        id: prompt
        env:
          PR: ${{ inputs.pr_number }}
          REPO: ${{ inputs.target_repo }}
          ISSUE: ${{ inputs.orchestrator_issue }}
        run: |
          python3 scripts/build-test-prompt.py
          {
            echo 'value<<QA_PROMPT_DELIMITER'
            cat /tmp/test-prompt.txt
            echo 'QA_PROMPT_DELIMITER'
          } >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@beta
        env:
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mode: agent
          model: claude-sonnet-4-6
          allowed_tools: Bash,Read,Write,Edit,Glob,Grep
          timeout_minutes: 30
          max_turns: 40
          direct_prompt: ${{ steps.prompt.outputs.value }}
