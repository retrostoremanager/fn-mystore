name: Test Agent

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number that was just deployed'
        required: true
        type: string
      target_repo:
        description: 'Repo that was deployed (fn-mystore or web-mystore)'
        required: true
        type: string
        default: 'fn-mystore'
      orchestrator_issue:
        description: 'Orchestrator issue number (if any)'
        required: false
        type: string
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 1

      - name: Build test prompt
        id: prompt
        env:
          PR: ${{ inputs.pr_number }}
          REPO: ${{ inputs.target_repo }}
          ISSUE: ${{ inputs.orchestrator_issue }}
        run: |
          python3 scripts/build-test-prompt.py
          {
            echo 'value<<QA_PROMPT_DELIMITER'
            cat /tmp/test-prompt.txt
            echo 'QA_PROMPT_DELIMITER'
          } >> "$GITHUB_OUTPUT"

      - id: claude
        uses: anthropics/claude-code-action@beta
        env:
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_COMPANY_SLUG: ${{ secrets.TEST_COMPANY_SLUG }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mode: agent
          model: claude-sonnet-4-6
          allowed_tools: Bash,Read,Write,Edit,Glob,Grep
          timeout_minutes: 45
          max_turns: 80
          direct_prompt: ${{ steps.prompt.outputs.value }}

      - name: Handle spending cap
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          ISSUE_N: ${{ inputs.orchestrator_issue }}
        run: |
          STEP_OUTPUT="${{ steps.claude.outputs.output }}"
          if ! echo "$STEP_OUTPUT" | grep -q "Spending cap reached"; then
            echo "Not a spending cap — stale recovery will handle it."
            exit 0
          fi
          if [ -z "$ISSUE_N" ]; then
            echo "No orchestrator issue — skipping cap-wait label"
            exit 0
          fi
          RESET_STR=$(echo "$STEP_OUTPUT" | grep -oP 'Spending cap reached resets \K[^\n]+' | head -1)
          RESET_ISO=""
          if [ -n "$RESET_STR" ]; then
            if echo "$RESET_STR" | grep -qP '^\d+:\d+(am|pm)'; then
              RESET_EPOCH=$(TZ=America/New_York date -d "$RESET_STR" +%s 2>/dev/null || echo "")
              if [ -n "$RESET_EPOCH" ]; then
                CURRENT=$(date +%s)
                if [ "$RESET_EPOCH" -le "$CURRENT" ]; then
                  RESET_EPOCH=$(TZ=America/New_York date -d "tomorrow $RESET_STR" +%s 2>/dev/null || echo "")
                fi
                [ -n "$RESET_EPOCH" ] && RESET_ISO=$(date -u -d "@$RESET_EPOCH" +%Y-%m-%dT%H:%M:%SZ)
              fi
            else
              RESET_EPOCH=$(TZ=America/New_York date -d "$RESET_STR" +%s 2>/dev/null || echo "")
              [ -n "$RESET_EPOCH" ] && RESET_ISO=$(date -u -d "@$RESET_EPOCH" +%Y-%m-%dT%H:%M:%SZ)
            fi
          fi
          [ -z "$RESET_ISO" ] && RESET_ISO=$(date -u -d "+8 hours" +%Y-%m-%dT%H:%M:%SZ)
          GH_TOKEN="$GH_DISPATCH_TOKEN" gh issue edit "$ISSUE_N" \
            --repo retrostoremanager/orchestrator-mystore \
            --add-label "cap-wait"
          GH_TOKEN="$GH_DISPATCH_TOKEN" gh issue comment "$ISSUE_N" \
            --repo retrostoremanager/orchestrator-mystore \
            --body "Spending cap reached. RESET_ISO: ${RESET_ISO}
          Raw message: $RESET_STR
          Will auto-resume after reset."
          echo "Marked issue #$ISSUE_N with cap-wait (resets $RESET_ISO)"
