# Azure Pipeline for MyStore Function App
# This pipeline builds and deploys the Azure Functions application
# Supports: development, QA, staging, and production environments

trigger:
  branches:
    include:
      - main
      - develop
      - qa
      - staging
  paths:
    include:
      - MyStore.Functions/*
      - MyStore.Services/*
      - MyStore.Repositories/*
      - MyStore.Models/*

parameters:
  - name: environment
    displayName: 'Target Environment'
    type: string
    default: 'development'
    values:
      - development
      - qa
      - staging
      - production

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  dotNetFramework: 'net8.0'
  # Environment-specific variables - set these per environment in Azure DevOps variable groups
  # Variable groups: mystore-function-dev, mystore-function-qa, mystore-function-staging, mystore-function-prod
  - group: 'mystore-function-${{ parameters.environment }}'
  # Map branch to environment if parameter not provided
  - name: targetEnvironment
    value: ${{ coalesce(parameters.environment, variables['Build.SourceBranchName']) }}
    ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
      value: 'production'
    ${{ elseif eq(variables['Build.SourceBranch'], 'refs/heads/staging') }}:
      value: 'staging'
    ${{ elseif eq(variables['Build.SourceBranch'], 'refs/heads/qa') }}:
      value: 'qa'
    ${{ else }}:
      value: 'development'

stages:
- stage: Build
  displayName: 'Build Function App'
  jobs:
  - job: Build
    displayName: 'Build and Package'
    steps:
    - checkout: self
      displayName: 'Checkout code from GitHub'
      persistCredentials: true

    - task: UseDotNet@2
      displayName: 'Use .NET 8 SDK'
      inputs:
        packageType: 'sdk'
        version: '8.x'

    - task: DotNetCoreCLI@2
      displayName: 'Restore NuGet packages'
      inputs:
        command: 'restore'
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Build solution'
      inputs:
        command: 'build'
        projects: '**/*.sln'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - task: DotNetCoreCLI@2
      displayName: 'Publish Function App'
      inputs:
        command: 'publish'
        projects: 'MyStore.Functions/MyStore.Functions.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/function-app --no-build'
        zipAfterPublish: false

    - task: ArchiveFiles@2
      displayName: 'Archive Function App'
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/function-app'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/function-app.zip'
        replaceExistingArchive: true

    - task: PublishBuildArtifacts@1
      displayName: 'Publish build artifacts'
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)/function-app.zip'
        artifactName: 'function-app'
        publishLocation: 'Container'

- stage: Deploy
  displayName: 'Deploy Function App to ${{ variables.targetEnvironment }}'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployFunctionApp
    displayName: 'Deploy to ${{ variables.targetEnvironment }}'
    environment: '${{ variables.targetEnvironment }}'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureFunctionApp@1
            displayName: 'Deploy Azure Function App'
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'functionApp'
              appName: '$(functionAppName)'
              package: '$(Pipeline.Workspace)/function-app/function-app.zip'
              deploymentMethod: 'zipDeploy'

          - task: AzureAppServiceSettings@1
            displayName: 'Configure Application Settings'
            inputs:
              azureSubscription: '$(azureSubscription)'
              appName: '$(functionAppName)'
              appSettings: |
                [
                  {
                    "name": "FUNCTIONS_WORKER_RUNTIME",
                    "value": "dotnet-isolated",
                    "slotSetting": false
                  },
                  {
                    "name": "ASPNETCORE_ENVIRONMENT",
                    "value": "${{ variables.targetEnvironment }}",
                    "slotSetting": false
                  },
                  {
                    "name": "ConnectionStrings__DefaultConnection",
                    "value": "$(postgresConnectionString)",
                    "slotSetting": false
                  }
                ]

